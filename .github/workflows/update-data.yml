name: Update seasonal data

on:
  schedule:
    - cron: '0 2 1 * *'   # 每月 1 日 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:        # 也可在 GitHub 網頁手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch seasonal data from twfood.cc
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update seasonal data $(date +%Y-%m)"
          git push
